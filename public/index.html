<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Skun - Railway</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="screen">
      <div class="card">
        <h1>💬 Chat Skun</h1>
        <p>Masukin nama lu dulu bre</p>
        <form id="login-form">
          <input type="text" id="username-input" placeholder="Username..." required>
          <button type="submit" class="btn-primary">Masuk</button>
        </form>
      </div>
    </div>

    <!-- Lobby Screen -->
    <div id="lobby-screen" class="screen hidden">
      <div class="lobby-card">
        <div class="header">
          <h2>👤 <span id="display-username"></span></h2>
          <button onclick="logout()" class="btn-danger">Logout</button>
        </div>

        <div class="section">
          <h3>🔑 Join via Kode</h3>
          <div class="form-row">
            <input type="text" id="join-code" placeholder="Masukin kode...">
            <button onclick="joinByCode()" class="btn-success">Join</button>
          </div>
        </div>

        <div class="section">
          <h3>➕ Buat Skun Baru</h3>
          <form id="create-room-form" class="form-row">
            <input type="text" id="room-name" placeholder="Nama grup..." required>
            <button type="submit" class="btn-primary">Buat</button>
          </form>
        </div>

        <div class="room-list">
          <h3>📋 Skun yang ada:</h3>
          <div id="rooms-container"></div>
        </div>
      </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen" class="screen hidden">
      <div class="chat-container">
        <div class="chat-header">
          <button onclick="leaveRoom()" class="btn-secondary">← Back</button>
          <div>
            <h3 id="room-title">Room Name</h3>
            <small id="room-code">Kode: -</small>
          </div>
        </div>
        
        <div id="messages" class="messages"></div>

        <form id="chat-form" class="chat-form">
          <input type="text" id="message-input" placeholder="Ketik pesan..." required>
          <button type="submit" class="btn-primary">Kirim</button>
        </form>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
